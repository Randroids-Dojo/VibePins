<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>VibePins</title>
  <style>
    :root { color-scheme: dark; }
    html, body { margin: 0; height: 100%; background: #05060a; overflow: hidden; }
    #lane { display: block; width: 100vw; height: 100vh; }

    /* Scoreboard overlay (REQ-012). A plain readable board for now; the
       electromechanical split-flap skin (REQ-042) is a later slice. */
    #scoreboard {
      position: fixed; top: 0; left: 0; right: 0;
      display: flex; justify-content: center; gap: 2px;
      padding: 6px 8px;
      font: 600 13px/1.2 ui-monospace, "SFMono-Regular", Menlo, monospace;
      color: #f4ecd6; background: rgba(8, 10, 16, 0.55);
      pointer-events: none; user-select: none;
    }
    .vp-frame {
      display: flex; flex-direction: column; align-items: stretch;
      border: 1px solid rgba(244, 236, 214, 0.35); min-width: 38px;
    }
    .vp-frame-num {
      text-align: center; font-size: 10px; color: #b9a87a;
      border-bottom: 1px solid rgba(244, 236, 214, 0.2);
    }
    .vp-balls { display: flex; }
    .vp-ball {
      flex: 1; text-align: center; min-width: 12px; min-height: 14px;
      border-left: 1px solid rgba(244, 236, 214, 0.15);
    }
    .vp-ball:first-child { border-left: none; }
    .vp-cumulative { text-align: center; min-height: 16px; font-size: 15px; }

    #status {
      position: fixed; bottom: 14px; left: 0; right: 0; text-align: center;
      font: 600 15px/1.3 ui-monospace, "SFMono-Regular", Menlo, monospace;
      color: #f4ecd6; text-shadow: 0 1px 3px rgba(0, 0, 0, 0.8);
      pointer-events: none; user-select: none; padding: 0 12px;
    }

    /* First-run tutorial coach (REQ-047). A minimal metal-plate hint panel that
       names the current throw step and what one confirm does. Non-interactive
       (pointer-events: none) so taps still confirm through it, and it sits below
       the scoreboard so it never covers the live frame. Shown only on the first
       game and gone after the first throw; replayable from the menu. */
    #tutorial {
      position: fixed; top: 64px; left: 0; right: 0;
      display: flex; justify-content: center;
      pointer-events: none; user-select: none; padding: 0 12px; z-index: 50;
    }
    #tutorial[hidden] { display: none; }
    .vp-coach {
      max-width: 420px; padding: 10px 16px; border-radius: 6px;
      background: linear-gradient(rgba(20, 22, 29, 0.92), rgba(12, 14, 20, 0.92));
      border: 1px solid #c8923c;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.08), 0 3px 10px rgba(0, 0, 0, 0.55);
      text-align: center;
    }
    .vp-coach-step {
      font: 700 10px/1 ui-monospace, "SFMono-Regular", Menlo, monospace;
      letter-spacing: 0.16em; text-transform: uppercase; color: #ffcf7a;
      margin-bottom: 5px;
    }
    .vp-coach-instruction {
      font: 600 14px/1.35 ui-monospace, "SFMono-Regular", Menlo, monospace;
      color: #f4ecd6;
    }

    /* App-shell overlays (REQ-045): the title menu and the end-of-game summary.
       Industrial metal-plate look per the look-and-feel UI direction; the full
       split-flap / engraved-gauge skin (REQ-042, REQ-038) is a later slice.
       z-index sits above the canvas and the status line so the dialog cannot be
       sat under by background controls (RULE 10). */
    .vp-overlay {
      position: fixed; inset: 0; z-index: 100;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 18px; padding: 24px;
      background: radial-gradient(ellipse at center, rgba(12, 14, 20, 0.82), rgba(4, 5, 9, 0.94));
      color: #f4ecd6; text-align: center;
      font: 600 16px/1.4 ui-monospace, "SFMono-Regular", Menlo, monospace;
    }
    .vp-overlay[hidden] { display: none; }
    .vp-title {
      font-size: clamp(36px, 9vw, 72px); letter-spacing: 0.18em;
      margin: 0; text-transform: uppercase;
      color: #f4ecd6; text-shadow: 0 2px 0 #1b1d24, 0 0 18px rgba(255, 176, 64, 0.25);
    }
    .vp-tagline { margin: 0; color: #b9a87a; font-size: 14px; letter-spacing: 0.08em; }
    .vp-final { margin: 0; font-size: clamp(20px, 5vw, 30px); }
    .vp-final strong { color: #ffcf7a; font-size: 1.4em; }
    .vp-btn {
      appearance: none; cursor: pointer;
      min-width: 200px; padding: 14px 26px;
      font: 700 18px/1 ui-monospace, "SFMono-Regular", Menlo, monospace;
      letter-spacing: 0.12em; text-transform: uppercase;
      color: #f4ecd6; background: linear-gradient(#2a2d36, #181a21);
      border: 2px solid #3c3f4a; border-radius: 4px;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.08), 0 2px 6px rgba(0, 0, 0, 0.5);
    }
    .vp-btn:hover, .vp-btn:focus-visible { border-color: #c8923c; outline: none; }
    .vp-btn:active { transform: translateY(1px); }
    .vp-toggle {
      appearance: none; cursor: pointer;
      padding: 9px 18px; font: 600 13px/1 ui-monospace, "SFMono-Regular", Menlo, monospace;
      letter-spacing: 0.1em; color: #d8cba4;
      background: #14161d; border: 1px solid #3c3f4a; border-radius: 4px;
    }
    .vp-toggle[aria-pressed="true"] { color: #ffcf7a; border-color: #c8923c; }
    .vp-toggle:focus-visible { outline: 2px solid #c8923c; outline-offset: 2px; }
  </style>
</head>
<body>
  <canvas id="lane"></canvas>
  <div id="scoreboard" aria-label="Scoreboard"></div>
  <div id="status" aria-live="polite"></div>

  <!-- First-run control tutorial coach (REQ-047). Populated and toggled by
       src/main.ts per throw step; aria-live so the step is announced. -->
  <div id="tutorial" aria-live="polite" hidden>
    <div class="vp-coach" role="note">
      <div id="tutorial-step" class="vp-coach-step"></div>
      <div id="tutorial-instruction" class="vp-coach-instruction"></div>
    </div>
  </div>

  <!-- Title menu (REQ-045). Shown on boot and after returning from a summary. -->
  <div id="menu" class="vp-overlay" role="dialog" aria-modal="true" aria-labelledby="menu-title">
    <h1 id="menu-title" class="vp-title">VibePins</h1>
    <p class="vp-tagline">Duckpin bowling. Three balls a frame.</p>
    <button id="menu-play" class="vp-btn" type="button">Play</button>
    <button id="menu-audio" class="vp-toggle" type="button" aria-pressed="true">Audio: On</button>
    <button id="menu-tutorial" class="vp-toggle" type="button">How To Play</button>
  </div>

  <!-- End-of-game summary (REQ-045, REQ-011). The final score plus play again. -->
  <div id="summary" class="vp-overlay" role="dialog" aria-modal="true" aria-labelledby="summary-title" hidden>
    <h2 id="summary-title" class="vp-title">Game Over</h2>
    <p class="vp-final">Final score <strong id="summary-score">0</strong></p>
    <button id="summary-again" class="vp-btn" type="button">Play Again</button>
    <button id="summary-menu" class="vp-toggle" type="button">Main Menu</button>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
