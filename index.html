<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>VibePins</title>
  <style>
    :root { color-scheme: dark; }
    html, body { margin: 0; height: 100%; background: #05060a; overflow: hidden; }
    #lane { display: block; width: 100vw; height: 100vh; }

    /* Scoreboard overlay (REQ-012, REQ-042). The board reads as an
       electromechanical split-flap display bolted to a blackened-steel plate:
       each ball glyph and each running total sits on a split-flap card (a top
       and bottom leaf split by a centre hinge gap). When a cell's glyph changes
       between renders, src/scoreboard.ts adds .vp-flip to just that card and the
       leaf flips into place (the keyframes below), the way a real split-flap
       board snaps a new digit over. The flip is suppressed for users who ask to
       reduce motion (handled in src/scoreboard.ts and the media query below). */
    #scoreboard {
      position: fixed; top: 0; left: 0; right: 0;
      display: flex; justify-content: center; gap: 3px;
      padding: 7px 8px 9px;
      font: 700 13px/1.2 ui-monospace, "SFMono-Regular", Menlo, monospace;
      color: #f4ecd6;
      background: linear-gradient(rgba(18, 16, 12, 0.92), rgba(9, 8, 6, 0.92));
      border-bottom: 1px solid #6b5326;
      box-shadow: inset 0 -1px 0 rgba(255, 255, 255, 0.04), 0 2px 8px rgba(0, 0, 0, 0.55);
      pointer-events: none; user-select: none;
    }
    .vp-frame {
      display: flex; flex-direction: column; align-items: stretch; gap: 2px;
      padding: 3px 3px 2px;
      background: linear-gradient(#26221a, #15120d);
      border: 1px solid #3a3326; border-radius: 3px;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.05);
      min-width: 40px;
    }
    .vp-frame-num {
      text-align: center; font-size: 9px; letter-spacing: 0.08em; color: #b9923c;
    }
    .vp-balls { display: flex; gap: 2px; }
    /* A single split-flap card. Each leaf renders the full glyph at the card's
       full height but is clipped to its half (overflow: hidden), so the top leaf
       shows the glyph's upper half and the bottom leaf the lower half. The seam
       between them is the hinge line of a split-flap board. */
    .vp-flap {
      position: relative; display: inline-block;
      width: 14px; height: 20px; border-radius: 2px;
      background: #0a0907; border: 1px solid #000;
      box-shadow: inset 0 0 3px rgba(0, 0, 0, 0.8);
      color: #ffcf7a; perspective: 80px;
    }
    .vp-flap-leaf {
      position: absolute; left: 0; right: 0; height: 10px; overflow: hidden;
      background: linear-gradient(#26231b, #16140f);
      text-align: center; font-size: 15px; font-weight: 700;
    }
    /* Both leaves lay the glyph out across the full 20px card height, then clip:
       the top leaf is anchored at the card top, the bottom leaf at the card
       bottom, so each shows the matching half of the same glyph. */
    .vp-flap-top {
      top: 0; line-height: 20px; border-bottom: 1px solid #000;
    }
    .vp-flap-bottom {
      bottom: 0; line-height: 0;
    }
    .vp-cumulative { display: flex; justify-content: center; }
    .vp-cumulative .vp-flap { width: 18px; color: #f4ecd6; }
    .vp-ball .vp-flap-leaf { font-size: 13px; }

    /* The flip: the top leaf folds down over the hinge and back. Short and
       mechanical so the board snaps a new glyph rather than eases. */
    @keyframes vp-flap-fold {
      0% { transform: rotateX(0deg); }
      55% { transform: rotateX(-88deg); }
      100% { transform: rotateX(0deg); }
    }
    .vp-flip .vp-flap-top {
      transform-origin: bottom center; backface-visibility: hidden;
      animation: vp-flap-fold 0.4s ease-in;
    }
    @media (prefers-reduced-motion: reduce) {
      .vp-flip .vp-flap-top { animation: none; }
    }

    #status {
      position: fixed; bottom: 14px; left: 0; right: 0; text-align: center;
      font: 600 15px/1.3 ui-monospace, "SFMono-Regular", Menlo, monospace;
      color: #f4ecd6; text-shadow: 0 1px 3px rgba(0, 0, 0, 0.8);
      pointer-events: none; user-select: none; padding: 0 12px;
    }

    /* First-run tutorial coach (REQ-047). A minimal metal-plate hint panel that
       names the current throw step and what one confirm does. Non-interactive
       (pointer-events: none) so taps still confirm through it, and it sits below
       the scoreboard so it never covers the live frame. Shown only on the first
       game and gone after the first throw; replayable from the menu. */
    #tutorial {
      position: fixed; top: 64px; left: 0; right: 0;
      display: flex; justify-content: center;
      pointer-events: none; user-select: none; padding: 0 12px; z-index: 50;
    }
    #tutorial[hidden] { display: none; }
    .vp-coach {
      max-width: 420px; padding: 10px 16px; border-radius: 6px;
      background: linear-gradient(rgba(20, 22, 29, 0.92), rgba(12, 14, 20, 0.92));
      border: 1px solid #c8923c;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.08), 0 3px 10px rgba(0, 0, 0, 0.55);
      text-align: center;
    }
    .vp-coach-step {
      font: 700 10px/1 ui-monospace, "SFMono-Regular", Menlo, monospace;
      letter-spacing: 0.16em; text-transform: uppercase; color: #ffcf7a;
      margin-bottom: 5px;
    }
    .vp-coach-instruction {
      font: 600 14px/1.35 ui-monospace, "SFMono-Regular", Menlo, monospace;
      color: #f4ecd6;
    }

    /* Line-up indicator (REQ-033 step 1). A horizontal track with L and R end
       markers and a brass ball marker that slides to the chosen lateral stance.
       Shown only during the align phase. The track itself is the drag surface
       (pointer-events: auto) so a touch/mouse drag along it sets the stance;
       taps elsewhere still confirm through the rest of the overlay, which is
       non-interactive. A "Lock" caption reads the confirm affordance without
       instructions (pillar 4). Sits below the scoreboard/coach, above the
       status line. */
    #lineup {
      position: fixed; left: 0; right: 0; bottom: 56px;
      display: flex; flex-direction: column; align-items: center; gap: 8px;
      pointer-events: none; user-select: none; padding: 0 16px; z-index: 40;
    }
    #lineup[hidden] { display: none; }
    .vp-lineup-track {
      position: relative; pointer-events: auto; cursor: ew-resize;
      width: min(420px, 80vw); height: 30px;
      display: flex; align-items: center; touch-action: none;
    }
    .vp-lineup-rail {
      position: absolute; left: 20px; right: 20px; height: 6px; border-radius: 3px;
      background: linear-gradient(#1a1c23, #0c0e14);
      border: 1px solid #3c3f4a;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.05);
    }
    .vp-lineup-end {
      position: absolute; top: 50%; transform: translateY(-50%);
      font: 700 14px/1 ui-monospace, "SFMono-Regular", Menlo, monospace;
      color: #b9a87a; letter-spacing: 0.1em;
    }
    .vp-lineup-end.vp-l { left: 0; }
    .vp-lineup-end.vp-r { right: 0; }
    .vp-lineup-marker {
      position: absolute; top: 50%;
      width: 20px; height: 20px; border-radius: 50%;
      transform: translate(-50%, -50%);
      background: radial-gradient(circle at 35% 30%, #ffd98a, #c8923c 60%, #7a5a22);
      border: 1px solid #5a4418;
      box-shadow: 0 1px 4px rgba(0, 0, 0, 0.6);
    }
    .vp-lineup-caption {
      font: 700 10px/1 ui-monospace, "SFMono-Regular", Menlo, monospace;
      letter-spacing: 0.16em; text-transform: uppercase; color: #ffcf7a;
      text-shadow: 0 1px 2px rgba(0, 0, 0, 0.8);
    }

    /* Spin and power gauges (REQ-038 step 2 and step 3 of the throw). The two
       sweeping meters render as mechanical gauges on riveted metal plates: a
       recessed rail, a highlighted centred sweet-spot/straight band, L/R or
       SLOW/FAST end labels, and a brass needle that slides to the live cursor
       position each frame. Only the active step's gauge is shown; the click on
       each stop is the existing Web Audio cue (REQ-043). Non-interactive
       (pointer-events: none) so a tap anywhere still confirms through it, and it
       sits below the scoreboard/coach and above the status line. */
    #meters {
      position: fixed; left: 0; right: 0; bottom: 56px;
      display: flex; flex-direction: column; align-items: center; gap: 10px;
      pointer-events: none; user-select: none; padding: 0 16px; z-index: 40;
    }
    #meters[hidden] { display: none; }
    .vp-gauge[hidden] { display: none; }
    .vp-gauge {
      width: min(420px, 80vw);
      padding: 8px 12px 10px; border-radius: 6px;
      background: linear-gradient(rgba(30, 26, 20, 0.94), rgba(18, 16, 12, 0.94));
      border: 1px solid #6b5326;
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.06),
        0 3px 10px rgba(0, 0, 0, 0.55);
    }
    .vp-gauge-label {
      font: 700 10px/1 ui-monospace, "SFMono-Regular", Menlo, monospace;
      letter-spacing: 0.18em; text-transform: uppercase; color: #ffcf7a;
      text-align: center; margin-bottom: 7px;
    }
    .vp-gauge-track {
      position: relative; height: 26px; display: flex; align-items: center;
    }
    .vp-gauge-rail {
      position: absolute; left: 20px; right: 20px; height: 8px; border-radius: 4px;
      background: linear-gradient(#15140f, #0a0907);
      border: 1px solid #3a3326;
      box-shadow: inset 0 1px 2px rgba(0, 0, 0, 0.7);
    }
    /* The highlighted centred sweet-spot/straight band on the rail. Positioned
       in px by src/main.ts from meterBandSpan so it always matches the tuned
       config band, never a hardcoded width. */
    .vp-gauge-band {
      position: absolute; top: 50%; height: 8px; border-radius: 4px;
      transform: translateY(-50%);
      background: linear-gradient(#3fae5a, #2a7d40);
      box-shadow: 0 0 6px rgba(74, 200, 110, 0.5);
    }
    .vp-gauge-end {
      position: absolute; top: 50%; transform: translateY(-50%);
      font: 700 11px/1 ui-monospace, "SFMono-Regular", Menlo, monospace;
      color: #b9a87a; letter-spacing: 0.08em;
    }
    .vp-gauge-end.vp-lo { left: 0; }
    .vp-gauge-end.vp-hi { right: 0; }
    /* The brass needle that slides to the live cursor; positioned in px by
       src/main.ts each aiming frame so the motion is observable (RULE 10). */
    .vp-gauge-needle {
      position: absolute; top: 50%;
      width: 4px; height: 24px; border-radius: 2px;
      transform: translate(-50%, -50%);
      background: linear-gradient(#ffe0a0, #c8923c 60%, #7a5a22);
      border: 1px solid #5a4418;
      box-shadow: 0 0 6px rgba(255, 207, 122, 0.6);
    }

    /* App-shell overlays (REQ-045): the title menu and the end-of-game summary.
       Industrial metal-plate look per the look-and-feel UI direction; the full
       split-flap / engraved-gauge skin (REQ-042, REQ-038) is a later slice.
       z-index sits above the canvas and the status line so the dialog cannot be
       sat under by background controls (RULE 10). */
    .vp-overlay {
      position: fixed; inset: 0; z-index: 100;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 18px; padding: 24px;
      background: radial-gradient(ellipse at center, rgba(12, 14, 20, 0.82), rgba(4, 5, 9, 0.94));
      color: #f4ecd6; text-align: center;
      font: 600 16px/1.4 ui-monospace, "SFMono-Regular", Menlo, monospace;
    }
    .vp-overlay[hidden] { display: none; }
    .vp-title {
      font-size: clamp(36px, 9vw, 72px); letter-spacing: 0.18em;
      margin: 0; text-transform: uppercase;
      color: #f4ecd6; text-shadow: 0 2px 0 #1b1d24, 0 0 18px rgba(255, 176, 64, 0.25);
    }
    .vp-tagline { margin: 0; color: #b9a87a; font-size: 14px; letter-spacing: 0.08em; }
    .vp-final { margin: 0; font-size: clamp(20px, 5vw, 30px); }
    .vp-final strong { color: #ffcf7a; font-size: 1.4em; }
    .vp-btn {
      appearance: none; cursor: pointer;
      min-width: 200px; padding: 14px 26px;
      font: 700 18px/1 ui-monospace, "SFMono-Regular", Menlo, monospace;
      letter-spacing: 0.12em; text-transform: uppercase;
      color: #f4ecd6; background: linear-gradient(#2a2d36, #181a21);
      border: 2px solid #3c3f4a; border-radius: 4px;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.08), 0 2px 6px rgba(0, 0, 0, 0.5);
    }
    .vp-btn:hover, .vp-btn:focus-visible { border-color: #c8923c; outline: none; }
    .vp-btn:active { transform: translateY(1px); }
    .vp-toggle {
      appearance: none; cursor: pointer;
      padding: 9px 18px; font: 600 13px/1 ui-monospace, "SFMono-Regular", Menlo, monospace;
      letter-spacing: 0.1em; color: #d8cba4;
      background: #14161d; border: 1px solid #3c3f4a; border-radius: 4px;
    }
    .vp-toggle[aria-pressed="true"] { color: #ffcf7a; border-color: #c8923c; }
    .vp-toggle:focus-visible { outline: 2px solid #c8923c; outline-offset: 2px; }

    /* Leaderboard score submission on the summary screen (REQ-057). A name field
       plus a submit button, styled to match the metal-plate overlay, with a live
       status line that reports the server-assigned rank or an error. */
    .vp-submit { display: flex; flex-direction: column; align-items: center; gap: 12px; }
    .vp-name-input {
      width: 220px; padding: 11px 14px; text-align: center;
      font: 700 18px/1 ui-monospace, "SFMono-Regular", Menlo, monospace;
      letter-spacing: 0.16em; text-transform: uppercase;
      color: #ffcf7a; background: #0c0e14; caret-color: #ffcf7a;
      border: 2px solid #3c3f4a; border-radius: 4px;
    }
    .vp-name-input::placeholder { color: #6b6450; letter-spacing: 0.12em; }
    .vp-name-input:focus-visible { border-color: #c8923c; outline: none; }
    .vp-submit-status { margin: 0; min-height: 1.4em; font-size: 14px; color: #b9a87a; letter-spacing: 0.06em; }
    .vp-submit-status[data-state="ok"] { color: #8fd17a; }
    .vp-submit-status[data-state="error"] { color: #e08a6a; }

    /* Leaderboard standings board (REQ-060/061/063). Reachable from the main
       menu and the end-of-game summary. Rendered as the electromechanical
       rolling-counter standings language from look-and-feel: a blackened-steel
       plate of split-flap-style rows (rank, name, score), with an all-time /
       daily tab pair. The overlay reuses the .vp-overlay z-index (above the
       canvas and status line) so background controls cannot sit above it (RULE
       10). */
    .vp-board {
      width: min(460px, 92vw);
      display: flex; flex-direction: column; gap: 14px; align-items: center;
    }
    .vp-board-tabs { display: flex; gap: 8px; }
    .vp-tab {
      appearance: none; cursor: pointer;
      padding: 8px 18px; font: 700 12px/1 ui-monospace, "SFMono-Regular", Menlo, monospace;
      letter-spacing: 0.14em; text-transform: uppercase; color: #b9a87a;
      background: #14161d; border: 1px solid #3c3f4a; border-radius: 4px;
    }
    .vp-tab[aria-pressed="true"] { color: #ffcf7a; border-color: #c8923c; background: #1d1a12; }
    .vp-tab:focus-visible { outline: 2px solid #c8923c; outline-offset: 2px; }
    /* The standings plate: a framed list of rows on blackened steel. */
    .vp-board-list {
      width: 100%; box-sizing: border-box;
      display: flex; flex-direction: column; gap: 3px;
      padding: 10px; border-radius: 6px;
      background: linear-gradient(rgba(18, 16, 12, 0.96), rgba(9, 8, 6, 0.96));
      border: 1px solid #6b5326;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.05), 0 3px 10px rgba(0, 0, 0, 0.55);
      max-height: min(52vh, 440px); overflow-y: auto;
    }
    /* One standings row: rank chip, name, score, laid out as a rolling-counter
       card. The score sits on a recessed card like the scoreboard's totals. */
    .vp-board-row {
      display: grid; grid-template-columns: 2.6em 1fr auto; align-items: center; gap: 10px;
      padding: 7px 10px; border-radius: 3px;
      background: linear-gradient(#26221a, #15120d);
      border: 1px solid #3a3326;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.04);
      font: 700 15px/1.1 ui-monospace, "SFMono-Regular", Menlo, monospace;
    }
    .vp-board-rank { color: #b9923c; font-size: 13px; letter-spacing: 0.06em; }
    .vp-board-name {
      color: #f4ecd6; letter-spacing: 0.1em; text-transform: uppercase;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .vp-board-score {
      color: #ffcf7a; font-size: 17px; letter-spacing: 0.04em;
      padding: 2px 8px; border-radius: 3px;
      background: #0a0907; border: 1px solid #000;
      box-shadow: inset 0 0 3px rgba(0, 0, 0, 0.8);
    }
    /* Empty / loading / error states for the board, styled like a status line. */
    .vp-board-message {
      padding: 18px 10px; text-align: center; color: #b9a87a;
      font: 600 14px/1.4 ui-monospace, "SFMono-Regular", Menlo, monospace; letter-spacing: 0.06em;
    }
    .vp-board-message[data-state="error"] { color: #e08a6a; }
  </style>
</head>
<body>
  <canvas id="lane"></canvas>
  <div id="scoreboard" aria-label="Scoreboard"></div>
  <div id="status" aria-live="polite"></div>

  <!-- First-run control tutorial coach (REQ-047). Populated and toggled by
       src/main.ts per throw step; aria-live so the step is announced. -->
  <div id="tutorial" aria-live="polite" hidden>
    <div class="vp-coach" role="note">
      <div id="tutorial-step" class="vp-coach-step"></div>
      <div id="tutorial-instruction" class="vp-coach-instruction"></div>
    </div>
  </div>

  <!-- Line-up indicator (REQ-033 step 1). The track is the drag surface for
       touch/mouse lateral aim; the marker reflects the chosen stance. Toggled
       and positioned by src/main.ts during the align phase. -->
  <div id="lineup" aria-hidden="true" hidden>
    <div id="lineup-track" class="vp-lineup-track">
      <span class="vp-lineup-end vp-l">L</span>
      <div class="vp-lineup-rail"></div>
      <div id="lineup-marker" class="vp-lineup-marker"></div>
      <span class="vp-lineup-end vp-r">R</span>
    </div>
    <div class="vp-lineup-caption">Drag to aim &middot; tap to lock</div>
  </div>

  <!-- Spin and power gauges (REQ-038). The mechanical-gauge skin for the two
       sweeping meters: a needle slides along a rail with a highlighted centred
       band. src/main.ts shows the active step's gauge, sizes the band from the
       tuned config, and slides the needle to the live cursor each aiming frame. -->
  <div id="meters" aria-hidden="true" hidden>
    <div id="gauge-spin" class="vp-gauge" hidden>
      <div class="vp-gauge-label">Spin</div>
      <div class="vp-gauge-track">
        <span class="vp-gauge-end vp-lo">L</span>
        <div class="vp-gauge-rail"></div>
        <div id="gauge-spin-band" class="vp-gauge-band"></div>
        <div id="gauge-spin-needle" class="vp-gauge-needle"></div>
        <span class="vp-gauge-end vp-hi">R</span>
      </div>
    </div>
    <div id="gauge-power" class="vp-gauge" hidden>
      <div class="vp-gauge-label">Power</div>
      <div class="vp-gauge-track">
        <span class="vp-gauge-end vp-lo">SLOW</span>
        <div class="vp-gauge-rail"></div>
        <div id="gauge-power-band" class="vp-gauge-band"></div>
        <div id="gauge-power-needle" class="vp-gauge-needle"></div>
        <span class="vp-gauge-end vp-hi">SLOW</span>
      </div>
    </div>
  </div>

  <!-- Title menu (REQ-045). Shown on boot and after returning from a summary. -->
  <div id="menu" class="vp-overlay" role="dialog" aria-modal="true" aria-labelledby="menu-title">
    <h1 id="menu-title" class="vp-title">VibePins</h1>
    <p class="vp-tagline">Duckpin bowling. Three balls a frame.</p>
    <button id="menu-play" class="vp-btn" type="button">Play</button>
    <button id="menu-leaderboard" class="vp-toggle" type="button">Leaderboard</button>
    <button id="menu-audio" class="vp-toggle" type="button" aria-pressed="true">Audio: On</button>
    <button id="menu-tutorial" class="vp-toggle" type="button">How To Play</button>
  </div>

  <!-- End-of-game summary (REQ-045, REQ-011). The final score plus play again. -->
  <div id="summary" class="vp-overlay" role="dialog" aria-modal="true" aria-labelledby="summary-title" hidden>
    <h2 id="summary-title" class="vp-title">Game Over</h2>
    <p class="vp-final">Final score <strong id="summary-score">0</strong></p>
    <!-- Leaderboard score submission (REQ-057). The name pre-fills from the last
         name used (src/settings.ts) and the server re-scores the submitted line. -->
    <form id="summary-submit" class="vp-submit">
      <input id="summary-name" class="vp-name-input" type="text" maxlength="12"
             autocomplete="off" autocapitalize="characters" spellcheck="false"
             placeholder="YOUR NAME" aria-label="Name for the leaderboard" />
      <button id="summary-submit-btn" class="vp-btn" type="submit">Submit Score</button>
      <p id="summary-submit-status" class="vp-submit-status" aria-live="polite"></p>
    </form>
    <button id="summary-again" class="vp-btn" type="button">Play Again</button>
    <button id="summary-leaderboard" class="vp-toggle" type="button">Leaderboard</button>
    <button id="summary-menu" class="vp-toggle" type="button">Main Menu</button>
  </div>

  <!-- Leaderboard standings board (REQ-060/061/063). Reachable from the main
       menu and the end-of-game summary. The all-time/daily tabs flip the
       rendered standings; src/main.ts fetches both boards on open and renders
       rows into #board-list. Returning closes back to whichever screen opened
       it. -->
  <div id="board" class="vp-overlay" role="dialog" aria-modal="true" aria-labelledby="board-title" hidden>
    <h2 id="board-title" class="vp-title">Standings</h2>
    <div class="vp-board">
      <div class="vp-board-tabs" role="group" aria-label="Leaderboard period">
        <button id="board-tab-alltime" class="vp-tab" type="button" aria-pressed="true">All Time</button>
        <button id="board-tab-daily" class="vp-tab" type="button" aria-pressed="false">Today</button>
      </div>
      <div id="board-list" class="vp-board-list" aria-live="polite"></div>
    </div>
    <button id="board-back" class="vp-btn" type="button">Back</button>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
